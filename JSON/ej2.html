<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 - JSON y Tablas</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        table { width: 60%; border-collapse: collapse; margin: 20px auto; font-family: Arial; }
        th { background-color: #4CAF50; color: white; padding: 12px; }
        td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        tr:nth-child(even){ background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Información del Alumno</h2>

    <table>
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Edad</th>
            <th>Ciudad</th>
        </tr>
        </thead>
        <tbody>
            <tr>
                <td id="nombre_tabla"></td>
                <td id="apellidos_tabla"></td>
                <td id="edad_tabla"></td>
                <td id="ciudad_tabla"></td>
            </tr>
            </tbody>
    </table>

<script>
    $(document).ready(function () {
        //1. El objeto con los datos
        let persona = {
            nombre: "Pedro",
            apellido: "Poley",
            edad: 26,
            ciudad: "Granada"
        };

        //2. Serialización
        let personaTexto = JSON.stringify(persona);
        console.log("Enviando texto: " + personaTexto);

        //3. Deserialización
        let personaRecuperada = JSON.parse(personaTexto);

        //4. Insertar en la tabla con JQuery
        $("#nombre_tabla").text(personaRecuperada.nombre);
        $("#apellidos_tabla").text(personaRecuperada.apellidos);
        $("#edad_tabla").text(personaRecuperada.edad);
        $("#ciudad_tabla").text(personaRecuperada.cidudad);
    });
</script>
</body>
</html>
