<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1</title>
</head>
<body>
<h2>Ejemplo 1: Consulta de Usuarios</h2>

<div class="formulario">
    <label for="inputNombre">Nombre:</label>
    <input type="text" id="inputNombre" placeholder="Ej: Éver"><br>

    <label for="inputApellidos">Apellidos:</label>
    <input type="text" id="inputApellidos" placeholder="Ej: Banega"><br>

    <label for="inputEdad">Edad:</label>
    <input type="number" id="inputEdad"><br>

    <label for="inputCiudad">Ciudad:</label>
    <input type="text" id="inputCiudad" placeholder="Ej: Rosario"><br><br>

    <button onclick="ejecutarEjercicio()">Guardar y mostrar</button>
</div>

<p id="resultadoJson"></p>
<p id="resultadoObjeto"></p>

<table id="tablaDatos" style="display: none;" border="1">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <thead>
    <tr>
        <td id="celdaNombre"></td>
        <td id="celdaApellidos"></td>
        <td id="celdaEdad"></td>
        <td id="celdaCiudad"></td>
    </tr>
    </thead>
</table>
<script>
    // Función, convertir a JSON
    function convertirAJSON(objeto) {
        return JSON.stringify(objeto);
    }

    // Función, convertir JSON a objeto
    function convertirAObjeto(cadenaJSON) {
        return JSON.parse(cadenaJSON);
    }

    function ejecutarEjercicio() {

        const datosUsuario = {
            nombre: document.getElementById("inputNombre").value,
            apellidos: document.getElementById("inputApellidos").value,
            edad: document.getElementById("inputEdad").value,
            ciudad: document.getElementById("inputCiudad").value,
        };

        // Validar si hay huecos en blanco
        if(datosUsuario.nombre === "" || datosUsuario.apellidos === "") {
            alert("Por favor, rellena al menos el nombre y los apellidos.");
            return;
        }

        const stringJSON = convertirAJSON(datosUsuario);

        console.log("JSON Serializado: ", stringJSON);
        document.getElementById("resultadoJson").innerHTML = "<strong>JSON:</strong> " + stringJSON;

        const objetoRecuperado = convertirAObjeto(stringJSON);
        const textoRecuperado = `<strong>Recuperado:</strong> nombre:${objetoRecuperado.nombre}, apellidos:${objetoRecuperado.apellidos}, edad:${objetoRecuperado.edad}, ciudad:${objetoRecuperado.ciudad}`;

        console.log("Objeto Recuperado:", objetoRecuperado);

        document.getElementById("resultadoObjeto").innerHTML = textoRecuperado;

        // Rellenamos la tabla con el objeto que hemos recuperado del JSON
        document.getElementById("celdaNombre").innerText = objetoRecuperado.nombre;
        document.getElementById("celdaApellidos").innerText = objetoRecuperado.apellidos;
        document.getElementById("celdaEdad").innerText = objetoRecuperado.edad;
        document.getElementById("celdaCiudad").innerText = objetoRecuperado.ciudad;

        // Hacerla Visible
        document.getElementById("tablaDatos").style.display = "table";
    }
</script>

</body>
</html>
