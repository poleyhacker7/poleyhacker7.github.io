<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - Listas JSON</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        table { width: 80%; border-collapse: collapse; margin: 20px auto; }
        th { background-color: #2196F3; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<h2 style="text-align:center;">Lista de Clase</h2>

<table>
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <tbody id="cuerpoTabla"></tbody>
</table>

<script>
    $(document).ready(function() {
        // 1. DATO ORIGINAL: Ahora es un ARRAY [{}, {}, {}]
        let alumnos = [
            { nombre: "Alberto", apellidos: "García", edad: 26, ciudad: "Granada" },
            { nombre: "Lucía", apellidos: "Pérez", edad: 22, ciudad: "Sevilla" },
            { nombre: "Marcos", apellidos: "Ruiz", edad: 24, ciudad: "Málaga" }
        ];

        // 2. SERIALIZACIÓN (Lo conviertes a texto para "enviarlo")
        let listaTexto = JSON.stringify(alumnos);

        // 3. DESERIALIZACIÓN (Lo recuperas para "pintarlo")
        let listaRecuperada = JSON.parse(listaTexto);

        // 4. RECORRER LA LISTA CON JQUERY (Bucle $.each)
        // Esto es como decir: "Para cada alumno en la lista, haz lo siguiente..."
        $.each(listaRecuperada, function(indice, alumno) {
            let fila = `<tr>
                                <td>${alumno.nombre}</td>
                                <td>${alumno.apellidos}</td>
                                <td>${alumno.edad}</td>
                                <td>${alumno.ciudad}</td>
                            </tr>`;

            // Añadimos la fila al final del tbody
            $("#cuerpoTabla").append(fila);
        });
    });
</script>

</body>
</html>
