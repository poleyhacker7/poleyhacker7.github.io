<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MegaReto - Insertar y Borrar JSON</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        th { background-color: #333; color: white; }

        /* Estilos para los mensajes en el H2 */
        #mensaje { font-weight: bold; }
        .error { color: red; }
        .success { color: green; }

        /* Estilo para que sepa que se puede clicar */
        tbody tr { cursor: pointer; }
        tbody tr:hover { background-color: #ffecec; } /* Color rojizo al pasar el ratón */
    </style>
</head>
<body>

<h1>MEGARETO: Insertar y Borrar Productos</h1>

<h2 id="mensaje"></h2>

<div style="margin-bottom: 20px;">
    <input type="text" id="desc" placeholder="Descripción">
    <input type="number" id="prov" placeholder="ID Proveedor">
    <input type="number" step="0.01" id="prec" placeholder="Precio">
    <button id="btnEnviar">Insertar Producto</button>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>ID Proveedor</th>
        <th>Precio</th>
    </tr>
    </thead>
    <tbody id="tablaCuerpo"></tbody>
</table>

<script>
    $(document).ready(function() {
        const urlBase = "https://lm.iesnervion.es/reto4.php";

        // --- FUNCIÓN PARA INSERTAR (POST) ---
        $("#btnEnviar").on("click", function() {
            let datos = {
                descripcion: $("#desc").val(),
                idProveedor: parseInt($("#prov").val()),
                precio: parseFloat($("#prec").val())
            };

            $.ajax({
                url: urlBase,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(datos),
                success: function(respuesta) {
                    actualizarInterfaz(respuesta);
                }
            });
        });

        // --- FUNCIÓN PARA BORRAR (DELETE) ---
        // Usamos delegación de eventos porque los TR se crean dinámicamente
        $(document).on("click", "#tablaCuerpo tr", function() {
            // Obtenemos el ID que guardamos en el atributo 'id' del TR
            let idBorrar = $(this).attr("id");

            $.ajax({
                url: urlBase + "?id=" + idBorrar, // Pasamos el ID por la URL
                type: "DELETE",
                success: function(respuesta) {
                    if (respuesta.error === null) {
                        $("#mensaje").text("Se ha eliminado correctamente")
                            .attr("class", "success");

                        // Opcional: Volver a pintar la tabla con la nueva lista
                        actualizarInterfaz(respuesta);
                    } else {
                        $("#mensaje").text("Error al borrar: " + respuesta.error)
                            .attr("class", "error");
                    }
                }
            });
        });

        // Función auxiliar para no repetir código al pintar la tabla
        function actualizarInterfaz(res) {
            let h2 = $("#mensaje");
            if (!respuesta.error) {
                h2.text("Todo fue OK").attr("class", "success");
            } else {
                h2.text("Error: " + res.error).attr("class", "error");
            }

            let cuerpo = $("#tablaCuerpo");
            cuerpo.empty();

            $.each(res.lista, function(i, prod) {
                // CLAVE DEL MEGARETO: Guardamos el ID del producto en el id del TR
                let fila = `<tr id="${prod.id}">
                        <td>${prod.id}</td>
                        <td>${prod.descripcion}</td>
                        <td>${prod.idProveedor}</td>
                        <td>${prod.precio} €</td>
                    </tr>`;
                cuerpo.append(fila);
            });
        }
    });
</script>
</body>
</html>
